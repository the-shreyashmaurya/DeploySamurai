AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'DeploySamurai architecture recommendation summary for kbastani__spring-cloud-microservice-example:


  This Java Spring Cloud repository is best implemented as a microservices architecture,
  with nine identified containerized service candidates: api-gateway (routes external
  traffic), config (centralizes runtime configuration), consul (service discovery
  and cluster DNS), discovery (service discovery and routing metadata), hystrix-dashboard
  (circuit breaker and resilience dashboards), movie (manages movie catalog with MongoDB),
  movies-ui (serves the movie recommendation UI), recommendation (computes recommendations
  using Neo4j), and users (manages user profiles with MySQL).


  Communication flows are synchronous HTTP calls primarily routed through the api-gateway
  to hystrix-dashboard, movie, movies-ui, recommendation, and users services.


  Key considerations include the heuristic nature of service boundaries, the absence
  of repository tests which lowers deployment confidence, and the overall repository
  structure supporting independently deployable microservices. These factors should
  be reviewed prior to SAM generation.'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where ECS Fargate services will run
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for ECS Fargate tasks
Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
  ContainerTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
  ApiGatewayRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName:
        Fn::Sub: ${AWS::StackName}/api-gateway
      ImageScanningConfiguration:
        ScanOnPush: true
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /ecs/${AWS::StackName}/api-gateway
      RetentionInDays: 14
  ApiGatewayTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      RequiresCompatibilities:
      - FARGATE
      NetworkMode: awsvpc
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn:
        Fn::GetAtt:
        - ContainerTaskExecutionRole
        - Arn
      ContainerDefinitions:
      - Name: api-gateway
        Image:
          Fn::Sub:
          - ${RepositoryUri}:latest
          - RepositoryUri:
              Fn::GetAtt:
              - ApiGatewayRepository
              - RepositoryUri
        Essential: true
        PortMappings:
        - ContainerPort: 8080
          Protocol: tcp
        Environment:
        - Name: SPRING_PROFILES_ACTIVE
          Value: aws
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group:
              Ref: ApiGatewayLogGroup
            awslogs-region:
              Ref: AWS::Region
            awslogs-stream-prefix: api-gateway
  ApiGatewayService:
    Type: AWS::ECS::Service
    Properties:
      Cluster:
        Ref: EcsCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition:
        Ref: ApiGatewayTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            Ref: SubnetIds
