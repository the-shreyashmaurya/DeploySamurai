services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deploy_samurai
      POSTGRES_USER: deploy_samurai
      POSTGRES_PASSWORD: deploy_samurai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy_samurai -d deploy_samurai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
